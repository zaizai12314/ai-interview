version: "3.8"
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_interview
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - uploads:/app/uploads
    env_file:
      - .env
    depends_on:
      - db
      - redis
  celery-worker:
    build: .
    command: sh -c "pip install psycopg2-binary python-docx -q 2>/dev/null; celery -A app.tasks.celery_app worker --loglevel=info"
    volumes:
      - .:/app
      - uploads:/app/uploads
    env_file:
      - .env
    depends_on:
      - db
      - redis
volumes:
  pgdata:
  uploads: